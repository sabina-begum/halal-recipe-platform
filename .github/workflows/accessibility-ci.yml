name: Accessibility CI

on:
  pull_request:
  push:
    branches:
      - main

# Opt checkout/setup-node and other JS actions into Node 24 (GitHub deprecation of Node 20 for actions).
# See: https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Lighthouse CI (lhci) runs on ubuntu-latest; Chromium needs --no-sandbox in CI
# (see lighthouserc*.json settings.chromeFlags). If a job still fails, open the
# failed step log and search for "Assertion failed" or Chrome/Puppeteer errors.

jobs:
  lighthouse-accessibility:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Run Lighthouse accessibility baseline
        run: npm run a11y:ci
        env:
          NODE_OPTIONS: --max-old-space-size=6144

  lighthouse-accessibility-authenticated:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Run Lighthouse accessibility authenticated profile
        run: npm run a11y:ci:auth
        env:
          NODE_OPTIONS: --max-old-space-size=6144
