name: Accessibility CI

on:
  pull_request:
  push:
    branches:
      - main

# Least privilege for CodeQL / security scanning (contents read is enough for checkout + npm ci).
permissions:
  contents: read

# checkout@v6 / setup-node@v6 use Node 24 for the action runtime (see release notes).
# See also: https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Lighthouse CI (lhci) runs on ubuntu-latest; Chromium needs --no-sandbox in CI
# (see lighthouserc*.json settings.chromeFlags). If a job still fails, open the
# failed step log and search for "Assertion failed" or Chrome/Puppeteer errors.

jobs:
  lighthouse-accessibility:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Run Lighthouse accessibility baseline
        run: npm run a11y:ci
        env:
          NODE_OPTIONS: --max-old-space-size=6144

  lighthouse-accessibility-authenticated:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      # Confirms the runner picked up lighthouserc.auth.json from this commit (must be < 1 for ~0.96 scores).
      - name: Print LHCI auth accessibility minScore
        run: |
          node -e "const c=require('./lighthouserc.auth.json'); const a=c.ci.assert.assertions['categories:accessibility']; const m=a[1].minScore; console.log('categories:accessibility minScore =', m); if (m>=1) { console.error('FAIL: minScore must be < 1 (e.g. 0.95) so CI passes when Lighthouse reports 0.96.'); process.exit(1); }"

      # lighthouserc.auth.json asserts minScore 0.95. Scores ~0.96 on shopping-list / nutrition pass.
      - name: Run Lighthouse accessibility authenticated profile
        run: npm run a11y:ci:auth
        env:
          NODE_OPTIONS: --max-old-space-size=6144
